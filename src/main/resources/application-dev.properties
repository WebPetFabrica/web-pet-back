# src/main/resources/application-dev.properties

# H2 Database for Development
spring.datasource.url=jdbc:h2:mem:webpetdev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console for development (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Flyway (disable for H2 development)
spring.flyway.enabled=false

# CORS - Desenvolvimento (mais permissivo)
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000
app.cors.max-age=300

# Logs mais verbosos em dev
logging.level.br.edu.utfpr.alunos.webpet=DEBUG
logging.level.org.springframework.web.cors=DEBUG
# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Cache Configuration
app.cache.enabled=true
app.cache.warmup-on-startup=true

# Cache TTL Settings
app.cache.ttl.sessions=30m
app.cache.ttl.auth-tokens=2h
app.cache.ttl.user-profiles=30m
app.cache.ttl.user-permissions=10m
app.cache.ttl.user-stats=1h
app.cache.ttl.search-results=10m
app.cache.ttl.system-config=24h

# Session Management
spring.session.store-type=redis
spring.session.redis.namespace=webpet:session
spring.session.timeout=30m

# Cache Metrics
management.endpoints.web.exposure.include=health,info,metrics,cache
management.endpoint.health.show-details=when-authorized
management.metrics.cache.instrument=true

# Logging for Cache
logging.level.br.edu.utfpr.alunos.webpet.services.cache=DEBUG
logging.level.org.springframework.cache=INFO
logging.level.org.springframework.data.redis=INFO
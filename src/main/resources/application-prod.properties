# Production Configuration for WebPet Application

# Application Configuration
spring.application.name=WebPet
server.port=${PORT:8081}
server.servlet.context-path=/
server.shutdown=graceful

# Database Configuration - Production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Production Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Production JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# Security Configuration - Production
api.security.token.secret=${JWT_SECRET}
api.security.token.expiration=${JWT_EXPIRATION:7200000}

# CORS Configuration - Production (Restrictive)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=Content-Type,Authorization,X-Requested-With
app.cors.allow-credentials=true
app.cors.max-age=3600

# Production Logging Configuration
logging.level.root=WARN
logging.level.br.edu.utfpr.alunos.webpet=INFO
logging.level.SECURITY=INFO
logging.level.AUDIT=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN
logging.level.com.zaxxer.hikari=WARN

# Structured JSON Logging for Production
logging.json.enabled=true
logging.json.include-mdc=true
logging.json.include-context=true

# Production File Logging
logging.file.name=/app/logs/webpet.log
logging.file.max-size=100MB
logging.file.max-history=30
logging.file.total-size-cap=5GB

# Rate Limiting - Production (Stricter)
rate-limit.general.requests-per-minute=50
rate-limit.auth.requests-per-minute=5
rate-limit.cache-size=50000
rate-limit.cleanup-interval=300000

# Security Headers and Settings
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Error Handling - Production (Minimal exposure)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Actuator - Production (Secured)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoints.web.base-path=/actuator
management.security.enabled=true

# Cache Configuration - Production
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Async Configuration - Production
spring.task.execution.pool.core-size=16
spring.task.execution.pool.max-size=32
spring.task.execution.pool.queue-capacity=200

# Transaction Configuration - Production
spring.transaction.default-timeout=60
spring.transaction.rollback-on-commit-failure=true